<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Hello World Login</title>
  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: rgba(0, 0, 0, 0.45);
      padding: 35px;
      border-radius: 18px;
      width: 340px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      background: #ff5fa2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff3f91;
    }

    #message {
      margin-top: 25px;
      font-size: 24px;
      font-weight: bold;
    }

    .love-img {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Benutzername">
  <input type="password" id="password" placeholder="Passwort">

  <button onclick="login()">Login</button>

  <div id="message"></div>

  <!-- Bild: Datei muss im gleichen GitHub Ordner liegen -->
  <img id="loveImage" class="love-img" src="picture.jpg" alt="Love picture">
</div>

<script>
  const users = [
    {
      username: "admin",
      password: "1234"
    },
    {
      username: "sebastian",
      password: "test"
    },
    {
      username: "Ani",
      password: "1605"
    }
  ];

  function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");
    const loveImage = document.getElementById("loveImage");

    const foundUser = users.find(user =>
      user.username === username &&
      user.password === password
    );

    if (foundUser) {
      message.innerHTML = "Luv &lt;3";
      loveImage.style.display = "block";
    } else {
      message.innerHTML = "<span style='color:#ffb3b3'>Falscher Login</span>";
      loveImage.style.display = "none";
    }
  }
</script>

</body>
</html>
